             C 219 384, 238 369, 242 345
             C 246 321, 233 302, 231 279
             C 229 258, 236 237, 231 213
             C 225 182, 205 156, 205 121
             C 205 80, 238 48, 275 47
             C 290 46, 300 42, 308 44 Z"
