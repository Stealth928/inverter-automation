    <ellipse cx="348" cy="216" rx="21" ry="32" fill="#ddd8cc"/>
    <ellipse cx="350" cy="216" rx="11" ry="19" fill="#ccc4b4"/>
    <circle cx="233" cy="180" r="12" fill="#1a1f2e"/>
    <circle cx="237" cy="177" r="3.8" fill="#ffffff" opacity="0.45"/>
