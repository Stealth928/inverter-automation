<!-- V3: Transparent background — profile + arc, no opaque fill -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="arc2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="g2"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="c2"><circle cx="256" cy="256" r="245"/></clipPath>
  </defs>
  <!-- No background fill — transparent -->

  <!-- Charge arc — 88% fill, thick, glowing, enlarged -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="22"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#arc2)"
          stroke-width="22" stroke-linecap="round"
          stroke-dasharray="1373 187"
          stroke-dashoffset="390" filter="url(#g2)"/>

  <!-- Bust clipped to inner circle — scaled up ~8% -->
  <g clip-path="url(#c2)">
