<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex, nofollow">
  <title>Reset Password — SoCrates</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/favicon.ico" sizes="any">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="icon" href="/icons/icon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="mask-icon" href="/icons/icon.svg" color="#34d399">
  <meta name="theme-color" content="#0d1117">
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/shared-styles.css?v=9">
  <style>
    /* Inherit the same ambient glow and card style as login.html */
    .reset-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 16px;
      box-sizing: border-box;
      background:
        radial-gradient(ellipse 110% 55% at 50% -8%, color-mix(in srgb, var(--accent-blue) 9%, transparent) 0%, transparent 62%),
        radial-gradient(ellipse 55% 45% at 95% 98%, color-mix(in srgb, var(--color-success-dark) 6%, transparent) 0%, transparent 65%),
        var(--bg-primary);
    }

    .card {
      max-width: 460px;
      width: 100%;
      background: color-mix(in srgb, var(--bg-secondary) 90%, transparent);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--border-primary) 55%, transparent);
      box-shadow: var(--shadow-xl), 0 0 0 1px color-mix(in srgb, white 3%, transparent) inset;
    }

    .card-header {
      text-align: center;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent-blue) 10%, transparent) 0%,
        color-mix(in srgb, var(--accent-blue) 4%, transparent) 50%,
        transparent 100%);
      border-bottom: 1px solid color-mix(in srgb, var(--border-primary) 40%, transparent);
      padding: 28px 32px 20px;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.4));
    }
    .logo img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      display: block;
    }

    .card-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 5px;
      letter-spacing: -0.2px;
    }

    .card-header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0;
      line-height: 1.45;
    }

    .card-body {
      padding: 24px 28px 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-placeholder);
      pointer-events: none;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
    }

    .input-wrapper:focus-within .input-icon {
      color: var(--accent-blue);
    }

    input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      background: var(--bg-input);
      border: 1.5px solid color-mix(in srgb, var(--border-primary) 80%, transparent);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px var(--accent-blue-bg);
    }

    input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    input::placeholder {
      color: var(--text-placeholder);
      opacity: 0.7;
    }

    .password-toggle {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s ease, background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .password-toggle:hover {
      color: var(--text-secondary);
      background: color-mix(in srgb, var(--border-primary) 30%, transparent);
    }

    /* Password strength indicator */
    .password-strength {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .strength-bars {
      display: flex;
      gap: 4px;
      flex: 1;
    }

    .strength-bar {
      height: 3px;
      flex: 1;
      border-radius: 3px;
      background: color-mix(in srgb, var(--border-primary) 60%, transparent);
      transition: background 0.3s ease;
    }

    .strength-bar.filled-1 { background: #ef4444; }
    .strength-bar.filled-2 { background: #f97316; }
    .strength-bar.filled-3 { background: #eab308; }
    .strength-bar.filled-4 { background: #22c55e; }

    .strength-label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 56px;
      text-align: right;
      transition: color 0.3s ease;
    }

    .btn {
      width: 100%;
      padding: 13px 20px;
      background: var(--gradient-success);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px color-mix(in srgb, var(--color-success-dark) 25%, transparent);
      margin-top: 4px;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.45;
      animation: fadeInDown 0.25s ease;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.show { display: flex; }

    .error {
      background: var(--color-danger-bg);
      border: 1px solid color-mix(in srgb, var(--color-danger) 30%, transparent);
      color: var(--color-danger);
    }

    .success {
      background: var(--color-success-bg);
      border: 1px solid color-mix(in srgb, var(--color-success-dark) 30%, transparent);
      color: var(--color-success);
    }

    .small {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 14px;
      line-height: 1.5;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover { color: var(--accent-blue); }

    .status-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    @media (max-width: 480px) {
      .reset-page {
        padding: 0;
        align-items: stretch;
      }
      .card {
        max-width: none;
        border-radius: 0;
        min-height: 100dvh;
        border-left: 0;
        border-right: 0;
      }
      .card-header { padding: 24px 20px 16px; }
      .card-body { padding: 20px 20px 28px; }
    }
  </style>
</head>
<body class="reset-page">
  <div class="card">
    <div class="card-header">
      <div class="logo"><img src="/icons/logo-login.svg" alt="SoCrates"></div>
      <h1>Set new password</h1>
      <p id="intro">Verifying your reset link&hellip;</p>
    </div>

    <div class="card-body">
      <div id="form" style="display:none">
        <div class="form-group">
          <label for="email">Account</label>
          <div class="input-wrapper">
            <input id="email" type="email" disabled autocomplete="username" />
            <span class="input-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg></span>
          </div>
        </div>
        <div class="form-group">
          <label for="password">New password</label>
          <div class="input-wrapper">
            <input id="password" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
            <span class="input-icon"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg></span>
            <button type="button" class="password-toggle" id="pwToggle" aria-label="Show password"><svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg></button>
          </div>
          <div id="pwStrength" class="password-strength" style="display:none">
            <div class="strength-bars">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <span class="strength-label"></span>
          </div>
        </div>
        <button id="submitBtn" class="btn">Set new password</button>
        <div id="msg" class="message"></div>
        <p class="small">After resetting, you'll be redirected to the sign-in page.</p>
      </div>

      <div id="fatal" style="display:none">
        <div id="fatalMsg" class="message error show"></div>
        <p class="small">If the link is expired or invalid, you can request a new one from the sign-in page.</p>
        <a href="/login.html" class="back-link">← Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script>
    (async () => {
      try {
        if (window.firebaseAuth && !firebaseAuth.initialized) {
          await firebaseAuth.init(window.firebaseConfig || {}, { allowMock: true });
        }
      } catch (e) {
        console.warn('firebaseAuth init failed on reset page:', e && e.message ? e.message : e);
      }
    })();
  </script>
  <script>
    // Password toggle
    const SVG_EYE_SHOW = '<svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>';
    const SVG_EYE_HIDE = '<svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.064 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/></svg>';

    document.getElementById('pwToggle').addEventListener('click', () => {
      const input = document.getElementById('password');
      const toggle = document.getElementById('pwToggle');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      toggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
      toggle.innerHTML = isPassword ? SVG_EYE_HIDE : SVG_EYE_SHOW;
    });

    // Password strength meter
    function updatePasswordStrength(value) {
      const container = document.getElementById('pwStrength');
      if (!container) return;
      const label = container.querySelector('.strength-label');
      const bars = container.querySelectorAll('.strength-bar');
      if (!value) { container.style.display = 'none'; return; }
      container.style.display = 'flex';
      let score = 0;
      if (value.length >= 8) score++;
      if (value.length >= 12) score++;
      if (/[A-Z]/.test(value) && /[a-z]/.test(value)) score++;
      if (/[0-9]/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;
      const level = value.length < 6 ? 0 : Math.min(4, Math.max(1, Math.ceil(score * 4 / 5)));
      const config = [null,
        { label: 'Weak',   color: 'filled-1' },
        { label: 'Fair',   color: 'filled-2' },
        { label: 'Good',   color: 'filled-3' },
        { label: 'Strong', color: 'filled-4' },
      ];
      bars.forEach((bar, i) => {
        bar.className = 'strength-bar';
        if (level > 0 && i < level) bar.classList.add(config[level].color);
      });
      if (label) {
        const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'];
        label.textContent = level === 0 ? 'Too short' : config[level].label;
        label.style.color = level === 0 ? '' : colors[level];
      }
    }
    document.getElementById('password').addEventListener('input', (e) => updatePasswordStrength(e.target.value));

    function qs(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    (async function () {
      const oobCode = qs('oobCode');
      const mode = qs('mode');

      const intro = document.getElementById('intro');
      const form = document.getElementById('form');
      const fatal = document.getElementById('fatal');
      const fatalMsg = document.getElementById('fatalMsg');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');

      if (!oobCode || mode !== 'resetPassword') {
        intro.textContent = 'This page is for completing password resets.';
        fatalMsg.innerHTML = '<span class="status-icon">⚠️</span><span>Missing or invalid password reset link.</span>';
        form.style.display = 'none'; fatal.style.display = 'block';
        return;
      }

      const waitForAuthInit = () => new Promise((res) => {
        if (window.firebaseAuth && firebaseAuth.initialized) return res();
        const t = setInterval(() => {
          if (window.firebaseAuth && firebaseAuth.initialized) { clearInterval(t); res(); }
        }, 100);
        setTimeout(() => { clearInterval(t); res(); }, 5000);
      });

      await waitForAuthInit();

      intro.textContent = 'Verifying your reset link\u2026';
      const verify = await firebaseAuth.verifyPasswordResetCode(oobCode);
      if (!verify.success) {
        intro.textContent = 'Invalid or expired link';
        fatalMsg.innerHTML = `<span class="status-icon">\u26a0\ufe0f</span><span>${verify.error || 'Invalid or expired password reset link.'}</span>`;
        form.style.display = 'none'; fatal.style.display = 'block';
        return;
      }

      emailInput.value = verify.email || '';
      intro.textContent = 'Enter a new password for your account.';
      form.style.display = 'block'; fatal.style.display = 'none';

      function showMessage(text, type) {
        msg.innerHTML = `<span class="status-icon">${type === 'error' ? '\u26a0\ufe0f' : '\u2713'}</span><span>${text}</span>`;
        msg.className = 'message show ' + (type === 'error' ? 'error' : 'success');
      }

      submitBtn.addEventListener('click', async () => {
        const newPassword = passwordInput.value || '';
        if (newPassword.length < 6) {
          showMessage('Password must be at least 6 characters', 'error');
          return;
        }
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="spinner"></div><span>Updating\u2026</span>';
        const res = await firebaseAuth.confirmPasswordReset(oobCode, newPassword);
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Set new password';
        if (!res.success) {
          showMessage(res.error || 'Failed to reset password', 'error');
          return;
        }
        showMessage('Password updated! Redirecting to sign in\u2026', 'success');
        setTimeout(() => { window.location.href = '/login.html'; }, 1800);
      });
    })();
  </script>
</body>
</html>
