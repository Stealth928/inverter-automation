name: Pre-Deployment Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    name: QA Checks Before Deployment
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: functions/package-lock.json

    - name: Verify docs impact alignment
      run: node scripts/docs-impact-check.js

    - name: Install functions dependencies
      run: npm --prefix functions ci

    - name: Verify Market Insights hosted freshness contract
      run: npm run test:market-insights:contracts
    
    - name: Run pre-deployment checks
      run: node scripts/pre-deploy-check.js
    
    - name: Run test suite
      run: npm --prefix functions test -- --passWithNoTests --runInBand

    - name: Run docs impact unit tests
      run: npm run test:docs:impact

    - name: Generate coverage report
      run: npm --prefix functions run test:coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./functions/coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint-check:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: functions/package-lock.json
    
    - name: Install dependencies
      run: npm --prefix functions ci
    
    - name: Run ESLint
      run: npm --prefix functions run lint

  security-check:
    name: Security Vulnerabilities
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          functions/package-lock.json

    - name: Install dependencies
      run: |
        npm ci
        npm --prefix functions ci
    
    - name: Run npm audit (functions)
      run: npm --prefix functions audit --audit-level=high

    - name: Run npm audit (root)
      run: npm audit --audit-level=high

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install root dependencies
      run: npm ci

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    - name: Run frontend E2E tests
      run: npx playwright test --reporter=line --workers=1
      env:
        CI: true

    - name: Upload Playwright artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-artifacts
        path: |
          playwright-report
          test-results
        if-no-files-found: ignore

  deployment-readiness:
    name: Deployment Readiness
    needs: [quality-assurance, lint-check, security-check, frontend-e2e]
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check deployment requirements
      run: |
        echo "✓ All checks passed"
        echo "✓ Ready for deployment"
        echo ""
        echo "Next steps:"
        echo "1. Review changes: git log --oneline -5"
        echo "2. Run: firebase deploy --only functions"
        echo "3. Verify in console: https://console.firebase.google.com"
