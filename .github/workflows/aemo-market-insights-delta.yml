name: AEMO Market Insights Delta Update

on:
  workflow_dispatch:
  schedule:
    - cron: '25 1 * * *'

jobs:
  delta-update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install root dependencies
        run: npm ci

      - name: Download latest AEMO monthly files (rolling window)
        run: |
          END_MONTH=$(date -u +%Y-%m)
          START_MONTH=$(date -u -d '2 months ago' +%Y-%m)
          python download_aemo_monthly.py --start "$START_MONTH" --end "$END_MONTH" --regions NSW QLD VIC SA TAS --out aemo-aggregated-data --overwrite

      - name: Delta update market insights data
        env:
          PYTHON_BIN: python
        run: npm run aemo:dashboard:update:delta

      - name: Report published freshness
        run: |
          node -e "const fs=require('fs');const p='frontend/data/aemo-market-insights/index.json';const index=JSON.parse(fs.readFileSync(p,'utf8'));const maxDate=index?.bounds?.maxDate||index?.dataworks?.freshness?.latestDate||null;if(!maxDate){console.error('Missing maxDate in generated index');process.exit(1);}console.log('[DataWorks] generatedAt=%s maxDate=%s',index.generatedAt,maxDate);"

      - name: Verify live hosting release matches current checkout
        id: release_guard
        run: |
          set +e
          ALIGNMENT_OUTPUT=$(node scripts/verify-release-alignment.js 2>&1)
          ALIGNMENT_STATUS=$?
          printf '%s\n' "$ALIGNMENT_OUTPUT"

          if [ "$ALIGNMENT_STATUS" -eq 0 ]; then
            echo "aligned=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "$ALIGNMENT_OUTPUT" | grep -q "Live hosting is on commit"; then
            echo "aligned=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping hosting deploy because the live site is behind the current checkout. Run the full Firebase deploy workflow first."
            exit 0
          fi

          exit "$ALIGNMENT_STATUS"

      - name: Generate release manifest
        if: steps.release_guard.outputs.aligned == 'true'
        run: node scripts/generate-release-manifest.js

      - name: Deploy Firebase hosting
        if: steps.release_guard.outputs.aligned == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::Missing GitHub Actions repository secret FIREBASE_TOKEN. Generate one with 'firebase login:ci' and add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          npx firebase-tools deploy --only hosting --project "inverter-automation-firebase" --token "$FIREBASE_TOKEN" --non-interactive

      - name: Verify hosted release manifest
        if: steps.release_guard.outputs.aligned == 'true'
        env:
          RELEASE_ALIGNMENT_RETRIES: 12
          RELEASE_ALIGNMENT_DELAY_MS: 10000
        run: node scripts/verify-release-alignment.js

      - name: Verify hosted freshness matches generated index
        if: steps.release_guard.outputs.aligned == 'true'
        run: |
          node <<'NODE'
          const fs = require('fs');

          const LOCAL_INDEX_PATH = 'frontend/data/aemo-market-insights/index.json';
          const URLS = [
            'https://inverter-automation-firebase.web.app/data/aemo-market-insights/index.json',
            'https://inverter-automation-firebase.firebaseapp.com/data/aemo-market-insights/index.json'
          ];
          const MAX_ATTEMPTS = 12;
          const ATTEMPT_DELAY_MS = 10000;

          function readExpectedMaxDate() {
            const index = JSON.parse(fs.readFileSync(LOCAL_INDEX_PATH, 'utf8'));
            const expected = index?.bounds?.maxDate || index?.dataworks?.freshness?.latestDate || null;
            if (!expected) {
              throw new Error('Missing expected maxDate in generated index');
            }
            return expected;
          }

          async function fetchHostedMaxDate(url) {
            const response = await fetch(`${url}?ts=${Date.now()}`, {
              headers: { 'Cache-Control': 'no-cache' }
            });
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            const index = await response.json();
            return index?.bounds?.maxDate || index?.dataworks?.freshness?.latestDate || null;
          }

          async function sleep(ms) {
            await new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function verifyUrl(url, expectedMaxDate) {
            let lastObserved = null;
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt += 1) {
              try {
                lastObserved = await fetchHostedMaxDate(url);
              } catch (error) {
                lastObserved = `error:${error?.message || error}`;
              }

              console.log(`[Verify] ${url} attempt ${attempt}/${MAX_ATTEMPTS} -> ${lastObserved}`);
              if (lastObserved === expectedMaxDate) {
                return;
              }

              if (attempt < MAX_ATTEMPTS) {
                await sleep(ATTEMPT_DELAY_MS);
              }
            }

            throw new Error(`Hosted maxDate mismatch for ${url}. expected ${expectedMaxDate}, observed ${lastObserved}`);
          }

          (async () => {
            const expectedMaxDate = readExpectedMaxDate();
            console.log(`[Verify] expected maxDate from generated index: ${expectedMaxDate}`);
            for (const url of URLS) {
              await verifyUrl(url, expectedMaxDate);
            }
            console.log(`[Verify] Hosting freshness check passed for maxDate=${expectedMaxDate}`);
          })().catch((error) => {
            console.error(error?.message || error);
            process.exit(1);
          });
          NODE

      - name: Report skipped hosting deploy
        if: steps.release_guard.outputs.aligned == 'false'
        run: echo "[DataWorks] Hosting deploy skipped because production hosting is not yet aligned with this checkout."
