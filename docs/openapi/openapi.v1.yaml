openapi: 3.1.0
info:
  title: Inverter Automation API
  version: 1.0.0
  description: >
    Incremental OpenAPI contract baseline used by npm run openapi:check.
    Coverage is still partial; use docs/API_CONTRACT_BASELINE.md for the
    current measured backend route inventory until spec parity is complete.
servers:
  - url: /
tags:
  - name: Health
  - name: Config
  - name: Pricing
  - name: Automation
  - name: Admin
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check endpoint
      operationId: getHealth
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeHealth"
  /api/config:
    get:
      tags: [Config]
      summary: Get current user config
      operationId: getConfig
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Config payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeConfig"
    post:
      tags: [Config]
      summary: Save current user config
      operationId: saveConfig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  type: object
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeGeneric"
  /api/config/validate-keys:
    post:
      tags: [Config]
      summary: Validate and save inverter/pricing credentials
      operationId: validateKeys
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: FoxESS credentials
                  type: object
                  properties:
                    device_sn:
                      type: string
                      description: FoxESS inverter serial number
                    foxess_token:
                      type: string
                      description: FoxESS Open API token
                    amber_api_key:
                      type: string
                      nullable: true
                      description: Amber Electric API key (optional)
                    pricing_provider:
                      $ref: "#/components/schemas/PricingProvider"
                    aemo_region:
                      $ref: "#/components/schemas/AemoRegion"
                - title: Sungrow credentials
                  type: object
                  required: [sungrow_device_sn, sungrow_username, sungrow_password]
                  properties:
                    sungrow_device_sn:
                      type: string
                      description: Sungrow inverter serial number
                    sungrow_username:
                      type: string
                      description: iSolarCloud account email
                    sungrow_password:
                      type: string
                      description: iSolarCloud account password
                    amber_api_key:
                      type: string
                      nullable: true
                      description: Amber Electric API key (optional)
                    pricing_provider:
                      $ref: "#/components/schemas/PricingProvider"
                    aemo_region:
                      $ref: "#/components/schemas/AemoRegion"
                - title: SigenEnergy credentials
                  type: object
                  required: [sigenergy_username, sigenergy_password]
                  properties:
                    sigenergy_username:
                      type: string
                      description: SigenEnergy cloud account email
                    sigenergy_password:
                      type: string
                      description: SigenEnergy cloud account password
                    sigenergy_region:
                      type: string
                      enum: [apac, eu, cn, us]
                      default: apac
                      description: SigenEnergy API region (default apac for Australia)
                    amber_api_key:
                      type: string
                      nullable: true
                      description: Amber Electric API key (optional)
                    pricing_provider:
                      $ref: "#/components/schemas/PricingProvider"
                    aemo_region:
                      $ref: "#/components/schemas/AemoRegion"
                - title: AlphaESS credentials
                  type: object
                  required: [alphaess_system_sn, alphaess_app_id, alphaess_app_secret]
                  properties:
                    alphaess_system_sn:
                      type: string
                      description: AlphaESS system serial number (sysSn)
                    alphaess_app_id:
                      type: string
                      description: AlphaESS OpenAPI appId
                    alphaess_app_secret:
                      type: string
                      description: AlphaESS OpenAPI appSecret
                    amber_api_key:
                      type: string
                      nullable: true
                      description: Amber Electric API key (optional)
                    pricing_provider:
                      $ref: "#/components/schemas/PricingProvider"
                    aemo_region:
                      $ref: "#/components/schemas/AemoRegion"
      responses:
        "200":
          description: Validation and save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeGeneric"
  /api/config/setup-status:
    get:
      tags: [Config]
      summary: Get setup completion status and active device provider
      operationId: getSetupStatus
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeSetupStatus"
  /api/pricing/sites:
    get:
      tags: [Pricing]
      summary: List available pricing sites or supported AEMO regions
      operationId: getPricingSites
      parameters:
        - in: query
          name: provider
          schema:
            $ref: "#/components/schemas/PricingProvider"
      responses:
        "200":
          description: Pricing site or region list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopePricingSelectionList"
  /api/pricing/current:
    get:
      tags: [Pricing]
      summary: Get current pricing intervals for the selected provider
      operationId: getPricingCurrent
      parameters:
        - in: query
          name: provider
          schema:
            $ref: "#/components/schemas/PricingProvider"
        - in: query
          name: siteId
          schema:
            type: string
        - in: query
          name: regionId
          schema:
            $ref: "#/components/schemas/AemoRegion"
        - in: query
          name: forceRefresh
          schema:
            type: boolean
      responses:
        "200":
          description: Current pricing intervals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopePricingIntervals"
  /api/pricing/prices:
    get:
      tags: [Pricing]
      summary: Get forecast or historical pricing intervals for the selected provider
      operationId: getPricingPrices
      parameters:
        - in: query
          name: provider
          schema:
            $ref: "#/components/schemas/PricingProvider"
        - in: query
          name: siteId
          schema:
            type: string
        - in: query
          name: regionId
          schema:
            $ref: "#/components/schemas/AemoRegion"
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
        - in: query
          name: resolution
          schema:
            type: integer
            enum: [5, 30]
        - in: query
          name: actual_only
          schema:
            type: boolean
      responses:
        "200":
          description: Forecast or historical pricing intervals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopePricingIntervals"
  /api/pricing/actual:
    get:
      tags: [Pricing]
      summary: Get a settled or historical price interval at a timestamp
      operationId: getPricingActual
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: provider
          schema:
            $ref: "#/components/schemas/PricingProvider"
        - in: query
          name: siteId
          schema:
            type: string
        - in: query
          name: regionId
          schema:
            $ref: "#/components/schemas/AemoRegion"
        - in: query
          name: timestamp
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Matching actual price interval or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopePricingActual"
  /api/config/announcement:
    get:
      tags: [Config]
      summary: Get the current eligible shared announcement for the signed-in user
      operationId: getAnnouncement
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Announcement payload or null when nothing is eligible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAnnouncement"
  /api/config/announcement/dismiss:
    post:
      tags: [Config]
      summary: Dismiss a show-once announcement for the current user
      operationId: dismissAnnouncement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Normalized show-once announcement ID to persist as dismissed
      responses:
        "200":
          description: Dismissal recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAnnouncementDismiss"
  /api/automation/status:
    get:
      tags: [Automation]
      summary: Get automation status and rules
      operationId: getAutomationStatus
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Automation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAutomationStatus"
  /api/admin/check:
    get:
      tags: [Admin]
      summary: Check whether the current authenticated user is an admin
      operationId: getAdminCheck
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAdminCheck"
  /api/admin/announcement:
    get:
      tags: [Admin]
      summary: Get the shared announcement configuration
      operationId: getAdminAnnouncement
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Shared announcement config payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAdminAnnouncement"
    post:
      tags: [Admin]
      summary: Save the shared announcement configuration
      operationId: saveAdminAnnouncement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                announcement:
                  $ref: "#/components/schemas/AnnouncementPayload"
      responses:
        "200":
          description: Saved shared announcement config payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAdminAnnouncement"
  /api/admin/announcement/audience-count:
    post:
      tags: [Admin]
      summary: Preview the live audience and dismissal visibility for an announcement
      operationId: previewAdminAnnouncementAudience
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                announcement:
                  $ref: "#/components/schemas/AnnouncementPayload"
                audience:
                  $ref: "#/components/schemas/AnnouncementAudience"
      responses:
        "200":
          description: Audience count and show-once dismissal visibility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAdminAnnouncementAudienceCount"
  /api/admin/platform-stats:
    get:
      tags: [Admin]
      summary: Get compact platform KPIs and trend data
      operationId: getAdminPlatformStats
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: days
          description: Number of trailing days to include (7-365).
          required: false
          schema:
            type: integer
            minimum: 7
            maximum: 365
            default: 90
      responses:
        "200":
          description: Platform KPI/trend payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAdminPlatformStats"
  /api/admin/scheduler-metrics:
    get:
      tags: [Admin]
      summary: Get scheduler orchestration summary, daily trend, and optional recent runs
      operationId: getAdminSchedulerMetrics
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: days
          description: Number of trailing days to include (1-90).
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 14
        - in: query
          name: includeRuns
          description: Include recent run-level snapshots.
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: runLimit
          description: Maximum number of recent runs when includeRuns=true (1-100).
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Scheduler metrics read model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAdminSchedulerMetrics"

  /api/backtests/runs:
    post:
      tags: [Automation]
      summary: Create a new backtest run
      operationId: createBacktestRun
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [period, scenarios]
              properties:
                period:
                  type: object
                  properties:
                    startDate:
                      type: string
                      format: date
                    endDate:
                      type: string
                      format: date
                includeBaseline:
                  type: boolean
                  default: true
                comparisonMode:
                  type: string
                  enum: [current_vs_baseline, current_vs_candidate, candidate_vs_baseline, current_vs_plan]
                scenarios:
                  type: array
                  maxItems: 3
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      ruleSetSnapshot:
                        type: object
                      tariff:
                        type: object
                        description: Optional scenario tariff override. Use a manual `plan` or `planId`, and optionally provide `fallbackPlan` to continue when provider-backed history is unavailable.
                        properties:
                          kind:
                            type: string
                          provider:
                            type: string
                          planId:
                            type: string
                          plan:
                            type: object
                          fallbackPlanId:
                            type: string
                          fallbackPlan:
                            type: object
      responses:
        "200":
          description: Backtest run created (status queued)
    get:
      tags: [Automation]
      summary: List recent backtest runs
      operationId: listBacktestRuns
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Array of backtest run summaries

  /api/backtests/runs/{runId}:
    get:
      tags: [Automation]
      summary: Get a specific backtest run with results
      operationId: getBacktestRun
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backtest run with results

  /api/backtests/tariff-plans:
    get:
      tags: [Automation]
      summary: List saved tariff plans
      operationId: listBacktestTariffPlans
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of tariff plan objects
    post:
      tags: [Automation]
      summary: Create a manual tariff plan
      operationId: createBacktestTariffPlan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, importWindows]
              properties:
                name:
                  type: string
                timezone:
                  type: string
                dailySupplyCharge:
                  type: number
                importWindows:
                  type: array
                  items:
                    type: object
                    properties:
                      startTime:
                        type: string
                      endTime:
                        type: string
                      centsPerKwh:
                        type: number
                exportWindows:
                  type: array
                  items:
                    type: object
                    properties:
                      startTime:
                        type: string
                      endTime:
                        type: string
                      centsPerKwh:
                        type: number
      responses:
        "200":
          description: Created tariff plan

  /api/backtests/tariff-plans/{planId}:
    post:
      tags: [Automation]
      summary: Update a tariff plan
      operationId: updateBacktestTariffPlan
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated tariff plan
    delete:
      tags: [Automation]
      summary: Delete a tariff plan
      operationId: deleteBacktestTariffPlan
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plan deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiEnvelopeBase:
      type: object
      required: [errno, result]
      properties:
        errno:
          type: integer
          description: 0 on success, non-zero for error class.
        result:
          nullable: true
        error:
          type: string
          nullable: true
        meta:
          type: object
          additionalProperties: true
          nullable: true
    ApiEnvelopeHealth:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                status:
                  type: string
                  examples: [OK]
    ApiEnvelopeConfig:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                pricingProvider:
                  $ref: "#/components/schemas/PricingProvider"
                amberApiKey:
                  type: string
                  nullable: true
                amberSiteId:
                  type: string
                  nullable: true
                aemoRegion:
                  $ref: "#/components/schemas/AemoRegion"
                siteIdOrRegion:
                  type: string
                  nullable: true
    PricingProvider:
      type: string
      enum: [amber, aemo]
    AemoRegion:
      type: string
      enum: [NSW1, QLD1, VIC1, SA1, TAS1]
      nullable: true
    PricingSelection:
      type: object
      properties:
        id:
          type: string
        regionId:
          $ref: "#/components/schemas/AemoRegion"
        name:
          type: string
        source:
          $ref: "#/components/schemas/PricingProvider"
    PricingInterval:
      type: object
      properties:
        type:
          type: string
          nullable: true
        channelType:
          type: string
          nullable: true
        descriptorType:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        perKwh:
          type: number
          nullable: true
        spotPerKwh:
          type: number
          nullable: true
        demand:
          type: number
          nullable: true
          description: AEMO regional total demand in MW when available
        demandForecast:
          type: number
          nullable: true
          description: AEMO regional demand forecast in MW when available
        generation:
          type: number
          nullable: true
          description: AEMO regional cleared or initial generation in MW when available
        estimate:
          type: boolean
          nullable: true
        source:
          $ref: "#/components/schemas/PricingProvider"
    ApiEnvelopePricingSelectionList:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: "#/components/schemas/PricingSelection"
    ApiEnvelopePricingIntervals:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: "#/components/schemas/PricingInterval"
    ApiEnvelopePricingActual:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              anyOf:
                - $ref: "#/components/schemas/PricingInterval"
                - type: 'null'
    AnnouncementAudience:
      type: object
      properties:
        requireTourComplete:
          type: boolean
        requireSetupComplete:
          type: boolean
        requireAutomationEnabled:
          type: boolean
        minAccountAgeDays:
          type: integer
          nullable: true
        onlyIncludeUids:
          type: array
          items:
            type: string
        includeUids:
          type: array
          items:
            type: string
        excludeUids:
          type: array
          items:
            type: string
    AnnouncementPayload:
      type: object
      properties:
        enabled:
          type: boolean
        id:
          type: string
          nullable: true
        title:
          type: string
        body:
          type: string
        severity:
          type: string
          enum: [info, success, warning, danger]
        showOnce:
          type: boolean
        audience:
          $ref: "#/components/schemas/AnnouncementAudience"
    AnnouncementPayloadWithMetadata:
      allOf:
        - $ref: "#/components/schemas/AnnouncementPayload"
        - type: object
          properties:
            updatedAt:
              nullable: true
            updatedByUid:
              type: string
              nullable: true
            updatedByEmail:
              type: string
              nullable: true
    ApiEnvelopeSetupStatus:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                hasConfig:
                  type: boolean
                hasDevice:
                  type: boolean
                hasAmber:
                  type: boolean
                setupComplete:
                  type: boolean
                deviceProvider:
                  type: string
                  enum: [foxess, sungrow, sigenergy, alphaess]
                  description: Active inverter provider
                hasAlphaEssSystemSn:
                  type: boolean
                  description: Whether an AlphaESS system serial number is saved
                hasAlphaEssAppId:
                  type: boolean
                  description: Whether an AlphaESS appId is saved
                hasSungrowUsername:
                  type: boolean
                  description: Whether an iSolarCloud username is saved (Sungrow only)
                hasSungrowDeviceSn:
                  type: boolean
                  description: Whether a Sungrow device serial number is saved
                hasSigenUsername:
                  type: boolean
                  description: Whether a SigenEnergy account username is saved
                hasSigenDeviceSn:
                  type: boolean
                  description: Whether a SigenEnergy device serial number is saved
                sigenRegion:
                  type: string
                  enum: [apac, eu, cn, us]
                  nullable: true
                  description: SigenEnergy API region (present when provider is sigenergy)
    ApiEnvelopeAutomationStatus:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                enabled:
                  type: boolean
                rules:
                  type: array
                  items:
                    type: object
    ApiEnvelopeAdminCheck:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                isAdmin:
                  type: boolean
    ApiEnvelopeAnnouncement:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                announcement:
                  anyOf:
                    - $ref: "#/components/schemas/AnnouncementPayload"
                    - type: 'null'
    ApiEnvelopeAnnouncementDismiss:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            msg:
              type: string
              nullable: true
            result:
              type: object
              properties:
                id:
                  type: string
                announcementDismissedIds:
                  type: array
                  items:
                    type: string
    ApiEnvelopeAdminAnnouncement:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                announcement:
                  $ref: "#/components/schemas/AnnouncementPayloadWithMetadata"
    AnnouncementAudiencePerformance:
      type: object
      properties:
        trackedDismissals:
          type: boolean
        announcementId:
          type: string
          nullable: true
        dismissedCount:
          type: integer
          nullable: true
        visibleCount:
          type: integer
        dismissalRate:
          type: number
          format: float
          nullable: true
    ApiEnvelopeAdminAnnouncementAudienceCount:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                count:
                  type: integer
                performance:
                  $ref: "#/components/schemas/AnnouncementAudiencePerformance"
    ApiEnvelopeAdminPlatformStats:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                summary:
                  type: object
                trend:
                  type: array
                  items:
                    type: object
                days:
                  type: integer
    ApiEnvelopeAdminSchedulerMetrics:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                days:
                  type: integer
                includeRuns:
                  type: boolean
                runLimit:
                  type: integer
                summary:
                  type: object
                soak:
                  type: object
                daily:
                  type: array
                  items:
                    type: object
                recentRuns:
                  type: array
                  items:
                    type: object
                currentAlert:
                  nullable: true
                  type: object
                updatedAt:
                  type: string
                  format: date-time
    ApiEnvelopeGeneric:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
