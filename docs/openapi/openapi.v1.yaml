openapi: 3.1.0
info:
  title: Inverter Automation API
  version: 1.0.0
  description: >
    Source-of-truth OpenAPI baseline started in Phase P1.
    This spec will be expanded incrementally as routes are refactored.
servers:
  - url: /
tags:
  - name: Health
  - name: Config
  - name: Automation
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check endpoint
      operationId: getHealth
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeHealth"
  /api/config:
    get:
      tags: [Config]
      summary: Get current user config
      operationId: getConfig
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Config payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeConfig"
    post:
      tags: [Config]
      summary: Save current user config
      operationId: saveConfig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  type: object
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeGeneric"
  /api/automation/status:
    get:
      tags: [Automation]
      summary: Get automation status and rules
      operationId: getAutomationStatus
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Automation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelopeAutomationStatus"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiEnvelopeBase:
      type: object
      required: [errno, result]
      properties:
        errno:
          type: integer
          description: 0 on success, non-zero for error class.
        result:
          nullable: true
        error:
          type: string
          nullable: true
        meta:
          type: object
          additionalProperties: true
          nullable: true
    ApiEnvelopeHealth:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                status:
                  type: string
                  examples: [ok]
    ApiEnvelopeConfig:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
    ApiEnvelopeAutomationStatus:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          properties:
            result:
              type: object
              properties:
                enabled:
                  type: boolean
                rules:
                  type: array
                  items:
                    type: object
    ApiEnvelopeGeneric:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
